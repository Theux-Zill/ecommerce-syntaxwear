<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntaxWear - Tênis e Sneakers Online</title>
    <meta name="description"
        content="Descubra a coleção exclusiva de tênis e sneakers da SyntaxWear. Estilo, conforto e qualidade para todos os passos. Ofertas imperdíveis e lançamentos exclusivos. Compre agora e transforme seu visual com os melhores tênis do mercado!">
    <link rel="stylesheet" href="./css/base/reset.css">
    <link rel="stylesheet" href="./css/base/variable.css">
    <link rel="stylesheet" href="./css/base/base.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/layout/header.css">
    <link rel="stylesheet" href="./css/components/hero.css">
    <link rel="stylesheet" href="./css/components/cards.css">

</head>

<body>
    <header class="site-header">
        <!-- Logo e navegação -->
        <h1>
            <a href="/" title="SyntaxWear - Tênis e Sneakers Online">
                <img src="./img/logo/logo.svg" alt="SyntaxWear - Tênis e Sneakers Online" class="logo">
            </a>
        </h1>
        <nav class="nav-center" aria-label="Categoria principal">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet </a></li>
            </ul>
        </nav>
        <nav class="nav-right" aria-label="Menu secundário">
            <ul>
                <li><a href="#">Nossas lojas</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#" aria-label="Perfil"><span class="icon-user"></span>
                        <img src="./img/icons/user.svg" alt="Perfil"></a></li>
                <li><a href="#" aria-label="Ajuda"><span class="icon-help"></span>
                        <img src="./img/icons/help.svg" alt="Ajuda"></a></li>
                <li><a href="#" aria-label="Carrinho"><span class="icon-cart"></span>
                        <img src="./img/icons/bag.svg" alt="Carrinho"></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <!-- Seção hero -->
            <div class="hero-overlay">
                <div class="hero-content">
                    <span class="hero-subtitle">Krypton One</span>
                    <h2 class="hero-title">Transforme qualquer passo em presença.</h2>
                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#">Ver modelos</a>
                        <a class="btn btn-filled" href="#">Comprar</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="categories-section">
            <!-- Seção de categorias de tênis -->
            <div class="category-card casual">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline ">Casual</span>
                </a>
            </div>
            <div class="category-card esportivo">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Esportivo</span>
                </a>
            </div>
            <div class="category-card moderno">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Moderno</span>
                </a>
            </div>
            <div class="category-card futurista">
                <a href="#" class="category-link">
                    <span class="overlay"></span>
                    <span class="category-name btn btn-outline">Futurista</span>
                </a>
            </div>
        </section>

        <section class="featured-products-section">
            <!-- Grid com produtos em destaque -->
        </section>
    </main>

    <footer class="site-footer">
        <!-- Informações de contato e links -->
    </footer>
</body>

</html>
